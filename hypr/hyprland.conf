# ===========================================================================
# Hyprland Configuration — hyprlang syntax (v0.55 compatible)
# Machine: AMD Ryzen 7 7840HS / RTX 4050 Mobile / AMD 780M iGPU
# Display: eDP-2 (connected via NVIDIA dGPU) 1920x1080@60Hz
# ===========================================================================

# ── Environment Variables ─────────────────────────────────────────────────────
env = XCURSOR_THEME,Breeze_Snow
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Breeze_Snow
env = HYPRCURSOR_SIZE,24
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,hyprland
env = XDG_CURRENT_DESKTOP,Hyprland

# GPU: NVIDIA dGPU is primary (screen eDP-2 is wired to it)
env = AQ_DRM_DEVICES,/dev/dri/by-name/dgpu:/dev/dri/by-name/igpu
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = GDK_BACKEND,wayland,x11,*
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# ── Monitors ──────────────────────────────────────────────────────────────────
monitor = eDP-1,preferred,auto,1
monitor = eDP-2,1920x1080@60,0x0,1
monitor = ,preferred,auto,1

# ── General ───────────────────────────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(89b4faee) rgba(cba6f7ee) 45deg
    col.inactive_border = rgba(585b70aa)
    layout = dwindle
    allow_tearing = false
}

# ── Input ─────────────────────────────────────────────────────────────────────
input {
    kb_layout = us
    kb_options =
    repeat_rate = 50
    repeat_delay = 300
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    numlock_by_default = true

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
        drag_lock = false
        scroll_factor = 1.0
    }
}

cursor {
    no_hardware_cursors = false
    hide_on_key_press = false
    inactive_timeout = 0
}

# ── Decoration ────────────────────────────────────────────────────────────────
decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        xray = false
        noise = 0.015
        contrast = 0.9
        brightness = 0.8
        popups = true
        popups_ignorealpha = 0.2
    }

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1e1e2ecc)
        color_inactive = rgba(1e1e2e77)
    }

    dim_inactive = true
    dim_strength = 0.15
    dim_special = 0.3
}

# ── Animations ────────────────────────────────────────────────────────────────
animations {
    enabled = true
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = easeInOut, 0.65, 0, 0.35, 1

    animation = windows, 1, 5, overshot, slide
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = windowsMove, 1, 4, smoothIn
    animation = border, 1, 5, default
    animation = borderangle, 1, 8, default, loop
    animation = fade, 1, 5, smoothIn
    animation = workspaces, 1, 6, easeInOut, slide
    animation = specialWorkspace, 1, 6, overshot, slidefadevert
}

# ── Layouts ───────────────────────────────────────────────────────────────────
dwindle {
    preserve_split = true
    force_split = 0
}

master {
    new_status = slave
    new_on_top = false
    mfact = 0.55
}

# ── Misc ──────────────────────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
}

binds {
    allow_workspace_cycles = true
}

# ── Autostart ─────────────────────────────────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE
exec-once = sleep 1 && /usr/lib/xdg-desktop-portal-hyprland
exec-once = sleep 2 && /usr/lib/xdg-desktop-portal --replace
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = hyprpaper
exec-once = waybar
exec-once = dunst
exec-once = hypridle
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = nm-applet --indicator
exec-once = blueman-applet

# ── Keybindings ───────────────────────────────────────────────────────────────
$mainMod = SUPER

# Applications
bind = $mainMod, Return, exec, kitty
bind = $mainMod CTRL, Return, exec, kitty --class floating
bind = $mainMod, E, exec, thunar
bind = $mainMod, B, exec, firefox
bind = $mainMod SHIFT, B, exec, firefox --private-window
bind = $mainMod, D, exec, rofi -show drun -show-icons
bind = $mainMod SHIFT, D, exec, python3 ~/.config/hypr/scripts/gpu-launcher.py
bind = $mainMod, R, exec, rofi -show run
bind = $mainMod ALT, Tab, exec, rofi -show window -show-icons
bind = $mainMod, V, exec, ~/.config/hypr/scripts/clip-pick.sh
bind = $mainMod SHIFT, E, exec, ~/.config/hypr/scripts/power-menu.sh

# Screenshots
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh region
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = $mainMod, Print, exec, ~/.config/hypr/scripts/screenshot.sh window

# Window management
bind = $mainMod, Q, killactive,
bind = $mainMod, T, togglefloating,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, M, fullscreen, 1
bind = $mainMod, P, pseudo,
bind = $mainMod SHIFT, P, pin,
bind = $mainMod, J, layoutmsg, togglesplit

# Focus (vim-style)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, Down, movefocus, d
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Left, movefocus, l
bind = $mainMod, Right, movefocus, r

# Move windows
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, Left, movewindow, l
bind = $mainMod SHIFT, Right, movewindow, r
bind = $mainMod SHIFT, Up, movewindow, u
bind = $mainMod SHIFT, Down, movewindow, d

# Resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, Tab, workspace, r+1
bind = $mainMod SHIFT, Tab, workspace, r-1
bind = $mainMod, mouse_down, workspace, r+1
bind = $mainMod, mouse_up, workspace, r-1

bind = $mainMod CTRL, Left, movetoworkspace, r-1
bind = $mainMod CTRL, Right, movetoworkspace, r+1

# Scratchpad
bind = $mainMod, grave, togglespecialworkspace, scratchpad
bind = $mainMod SHIFT, grave, movetoworkspace, special:scratchpad

# Session
bind = $mainMod CTRL, L, exec, hyprlock
bind = $mainMod SHIFT, R, exec, hyprctl reload

# Volume
bind = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume.sh up
bind = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume.sh down
bind = , XF86AudioMute, exec, ~/.config/hypr/scripts/volume.sh mute
bind = , XF86AudioMicMute, exec, pamixer --default-source --toggle-mute

# Brightness
bind = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness.sh up
bind = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh down

# Media
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Misc
bind = $mainMod SHIFT, C, exec, hyprpicker -a
bind = $mainMod, N, exec, dunstctl history-pop
bind = $mainMod SHIFT, N, exec, dunstctl close-all

# Gestures (v0.55+ syntax)
gesture = 3, horizontal, workspace
