# =============================================================================
# hyprlock.conf — Hyprlock Screen Locker Configuration
# Theme: Catppuccin Mocha
# =============================================================================

# ── Background ────────────────────────────────────────────────────────────────
# Takes a screenshot of the current screen, blurs it, and overlays widgets.
background {
    monitor     =
    path        = screenshot            # "screenshot" = blurred screenshot of current screen
    blur_passes = 3
    blur_size   = 7
    noise       = 0.02
    contrast    = 0.9
    brightness  = 0.7
    vibrancy    = 0.2
    vibrancy_darkness = 0.0
}

# ── Clock (large, top-center) ─────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H:%M")"
    color       = rgba(cdd6f4ff)        # Catppuccin Text
    font_size   = 90
    font_family = JetBrainsMono Nerd Font Bold

    position    = 0, 200
    halign      = center
    valign      = center
}

# ── Date (below clock) ───────────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:10000] echo "$(date +"%A, %d %B %Y")"
    color       = rgba(a6adc8cc)        # Catppuccin Subtext0, 80% alpha
    font_size   = 18
    font_family = JetBrainsMono Nerd Font

    position    = 0, 110
    halign      = center
    valign      = center
}

# ── Password input field ──────────────────────────────────────────────────────
input-field {
    monitor     =
    size        = 300, 50

    # Colours
    inner_color         = rgba(1e1e2e99)    # Catppuccin Base, 60% alpha
    outer_color         = rgba(89b4facc)    # Catppuccin Blue, 80% alpha
    font_color          = rgba(cdd6f4ff)    # Catppuccin Text
    check_color         = rgba(a6e3a1ff)    # Catppuccin Green
    fail_color          = rgba(f38ba8ff)    # Catppuccin Red
    capslock_color      = rgba(f9e2afff)    # Catppuccin Yellow

    # Dots / bullets
    dots_size           = 0.3
    dots_spacing        = 0.15
    dots_center         = true
    dots_rounding       = -1              # -1 = circular dots

    # Visual
    rounding            = 12
    outline_thickness   = 2
    fade_on_empty       = true
    fade_timeout        = 2000

    # Placeholder text
    placeholder_text    = <span foreground="##a6adc8"> Enter Password</span>
    hide_input          = false

    # Fail message
    fail_text           = <span foreground="##f38ba8">󰀖 Incorrect ($ATTEMPTS)</span>
    fail_transition     = 300

    position            = 0, -100
    halign              = center
    valign              = center
}

# ── Battery indicator ─────────────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:30000] echo "$(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1)%  $(cat /sys/class/power_supply/BAT*/status 2>/dev/null | head -1 | sed 's/Charging/󱐋 Charging/;s/Discharging/󰂄 Discharging/;s/Full/󰂅 Full/')"
    color       = rgba(a6adc8cc)        # Catppuccin Subtext0
    font_size   = 14
    font_family = JetBrainsMono Nerd Font

    position    = 0, -190
    halign      = center
    valign      = center
}

# ── "Press Enter to unlock" hint ─────────────────────────────────────────────
label {
    monitor     =
    text        = 󰌾  Locked
    color       = rgba(585b70aa)        # Catppuccin Surface2, very dim
    font_size   = 12
    font_family = JetBrainsMono Nerd Font

    position    = 0, -220
    halign      = center
    valign      = center
}
