# =============================================================================
# hypridle.conf — Idle Management
# Chain: dim screen → lock screen → display off → system suspend
# =============================================================================

general {
    # Command to lock the session (before sleep, or when login manager requests it)
    lock_cmd        = pidof hyprlock || hyprlock    # prevents duplicate instances
    before_sleep_cmd = loginctl lock-session        # lock before suspend/hibernate
    after_sleep_cmd  = hyprctl dispatch dpms on     # re-enable display on wake
    ignore_dbus_inhibit = false                     # respect "inhibit idle" from apps (e.g. video)
}

# ── Step 1: Dim screen after 4 minutes of inactivity ─────────────────────────
listener {
    timeout    = 240                                # seconds (4 min)
    on-timeout = brightnessctl -s set 20%           # dim to 20% and save current
    on-resume  = brightnessctl -r                   # restore saved brightness
}

# ── Step 2: Lock screen after 8 minutes ──────────────────────────────────────
listener {
    timeout    = 480                                # seconds (8 min)
    on-timeout = loginctl lock-session
    # on-resume is empty — hyprlock handles its own unlock
}

# ── Step 3: Turn off display after 12 minutes ─────────────────────────────────
listener {
    timeout    = 720                                # seconds (12 min)
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# ── Step 4: Suspend after 30 minutes ─────────────────────────────────────────
# Comment out if you don't want automatic suspend.
listener {
    timeout    = 1800                               # seconds (30 min)
    on-timeout = systemctl suspend
}
