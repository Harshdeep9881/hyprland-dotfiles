# =============================================================================
# hyprpaper.conf — Wallpaper Configuration
# =============================================================================

# Preload wallpapers into memory before assignment.
# Add more preload lines if you want multiple wallpapers for different monitors.
preload = ~/.config/hypr/wallpapers/default.png

# Assign wallpaper to monitor.
# Format: wallpaper = <monitor_name>, <image_path>
# Use empty string "" for all monitors.
wallpaper = eDP-1, ~/.config/hypr/wallpapers/default.png

# ── Splash (disable Hyprpaper watermark) ─────────────────────────────────────
splash = false

# ── IPC ───────────────────────────────────────────────────────────────────────
# Enable hyprctl to change wallpapers at runtime with:
#   hyprctl hyprpaper wallpaper "eDP-1,/path/to/image.jpg"
ipc = on
